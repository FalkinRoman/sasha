; Большие загрузки видео (админка Filament / Livewire). Синхронизуй с VIDEO_UPLOAD_MAX_MB в .env (не больше этих значений).
upload_max_filesize = 32G
post_max_size = 32G
max_file_uploads = 100
max_execution_time = 7200
max_input_time = 7200
memory_limit = 1024M

; Иначе warning/notice попадают в тело ответа → Livewire FileUpload ждёт JSON и падает (Unexpected token '<').
display_errors = Off
display_startup_errors = Off
log_errors = On
