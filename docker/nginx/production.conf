# Прод: prostoyoga.online + Let's Encrypt. Подключение: в .env для compose задать NGINX_CONF_FILE=production.conf
# Первый выпуск серта (порт 80 свободен): docker compose stop nginx
#   sudo certbot certonly --standalone -d prostoyoga.online -d www.prostoyoga.online
#   docker compose up -d nginx
# Другой домен — поменяй server_name и пути /etc/letsencrypt/live/…

server {
    listen 80;
    listen [::]:80;
    server_name prostoyoga.online www.prostoyoga.online;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name prostoyoga.online www.prostoyoga.online;

    ssl_certificate     /etc/letsencrypt/live/prostoyoga.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prostoyoga.online/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/html/public;
    index index.php;
    charset utf-8;

    client_max_body_size 0;
    client_body_timeout 7200s;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_SSL on;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 7200s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
