# ProstoYoga — локально и на VPS: docker compose up -d --build
# Скопируй .env.docker.example → .env, выставь APP_URL, APP_KEY, DB_PASSWORD, DB_ROOT_PASSWORD (на проде — не дефолты compose).

services:
  mysql:
    image: mariadb:11
    container_name: prostoy_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-me-root}
      MYSQL_DATABASE: ${DB_DATABASE:-prostoyoga}
      MYSQL_USER: ${DB_USERNAME:-prostoyoga}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me-app}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: prostoyoga-app
    container_name: prostoy_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    volumes:
      - .:/var/www/html
      - prostoy_vendor:/var/www/html/vendor
      - prostoy_public_build:/var/www/html/public/build
      # Лимиты загрузки: bind поверх образа — после git pull достаточно up -d (без rebuild), иначе часто остаётся дефолт PHP 8M.
      - ./docker/php/conf.d/99-prostoyoga-uploads.ini:/usr/local/etc/php/conf.d/99-prostoyoga-uploads.ini:ro
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan migrate:status >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  nginx:
    image: nginx:1.27-alpine
    container_name: prostoy_nginx
    restart: unless-stopped
    ports:
      # Дефолт 8888/8443 — 8080 часто занят phpMyAdmin/другим стеком.
      - "${HTTP_PORT:-8888}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - .:/var/www/html:ro
      - prostoy_vendor:/var/www/html/vendor:ro
      - prostoy_public_build:/var/www/html/public/build:ro
      - ./docker/nginx/${NGINX_CONF_FILE:-default.conf}:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ${CERTBOT_WEBROOT:-/var/www/certbot}:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy

  worker:
    image: prostoyoga-app
    container_name: prostoy_worker
    restart: unless-stopped
    user: www-data
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    volumes:
      - .:/var/www/html
      - prostoy_vendor:/var/www/html/vendor
      - prostoy_public_build:/var/www/html/public/build
      - ./docker/php/conf.d/99-prostoyoga-uploads.ini:/usr/local/etc/php/conf.d/99-prostoyoga-uploads.ini:ro
    depends_on:
      app:
        condition: service_healthy
    entrypoint: []
    command:
      - php
      - artisan
      - queue:work
      - database
      - --sleep=3
      - --tries=3
      - --max-time=3600

volumes:
  mysql_data:
  prostoy_vendor:
  prostoy_public_build:
